  <circle cx="200" cy="148" r="26" fill="#D84898" opacity="0.90"/>
  <circle cx="155" cy="148" r="24" fill="#E060A0" opacity="0.87"/>
  <circle cx="246" cy="142" r="24" fill="#E060A0" opacity="0.87"/>
  <circle cx="200" cy="92" r="28" fill="#D84898" opacity="0.92"/>
