  <!-- ── Pink divider line + flower ── -->
  <line x1="55" y1="432" x2="166" y2="432" stroke="#E090B8" stroke-width="1.5"/>
  <line x1="234" y1="432" x2="345" y2="432" stroke="#E090B8" stroke-width="1.5"/>
  <!-- flower petals -->
  <g transform="translate(200,432)">
    <ellipse cx="0" cy="-11" rx="5" ry="9" fill="#EAA0C8" transform="rotate(0)"/>
    <ellipse cx="0" cy="-11" rx="5" ry="9" fill="#EAA0C8" transform="rotate(60)"/>
