    <circle cx="-28" cy="0" r="2.5" fill="#E8B830"/>
    <circle cx="28" cy="0" r="2.5" fill="#E8B830"/>
  </g>

  <!-- ── FLORIDA (bottom) ── -->
  <text x="200" y="472"
    font-family="Georgia,'Times New Roman',serif"
    font-size="26"
    fill="#253020" text-anchor="middle" letter-spacing="18">FLORIDA</text>

