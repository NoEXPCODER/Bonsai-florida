  <circle cx="124" cy="152" r="22" fill="#901848" opacity="0.40"/>
  <circle cx="276" cy="145" r="22" fill="#901848" opacity="0.40"/>
  <circle cx="160" cy="108" r="22" fill="#901848" opacity="0.40"/>
  <circle cx="242" cy="104" r="22" fill="#901848" opacity="0.40"/>

