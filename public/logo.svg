  <circle cx="198" cy="94" r="10" fill="white" opacity="0.24"/>
  <circle cx="178" cy="132" r="6" fill="white" opacity="0.20"/>
  <circle cx="220" cy="126" r="6" fill="white" opacity="0.20"/>
  <circle cx="145" cy="156" r="5" fill="white" opacity="0.18"/>
